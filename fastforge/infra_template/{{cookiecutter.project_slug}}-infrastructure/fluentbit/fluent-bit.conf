[SERVICE]
    Flush        1
    Daemon       Off
    Log_Level    info
    Parsers_File parsers.conf

[INPUT]
    Name         tail
    Path         /var/log/app/*.log
    Tag          app.*
    Parser       json
    Read_from_Head True
    Refresh_Interval 5
    Rotate_Wait  30
    DB           /fluent-bit/etc/tail.db

[OUTPUT]
    Name         kafka
    Match        app.*
    Brokers      kafka:9092
    Topics       app-logs
    Format       json
    Timestamp_Key @timestamp
    Retry_Limit  5
