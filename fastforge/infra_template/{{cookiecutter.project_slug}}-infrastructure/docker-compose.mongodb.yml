services:
  mongodb:
    image: mongo:7
    container_name: {{ cookiecutter.project_slug }}-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongodata:
    name: {{ cookiecutter.project_slug }}-mongodata
