version: "2"

plugins:
  pep8:
    enabled: true
  radon:
    enabled: true
    config:
      threshold: "C"
  bandit:
    enabled: true

checks:
  argument-count:
    config:
      threshold: 5
  complex-logic:
    config:
      threshold: 4
  file-lines:
    config:
      threshold: 300
  method-complexity:
    config:
      threshold: 10
  method-count:
    config:
      threshold: 15
  method-lines:
    config:
      threshold: 30
  return-statements:
    config:
      threshold: 4

exclude_patterns:
  - "tests/"
  - ".venv/"
  - "__pycache__/"
  - "migrations/"
