# Fluent Bit — collects structured JSON logs and forwards to {{ cookiecutter.log_target }}
#
# If your environment already has a Fluent Bit daemon/DaemonSet,
# you only need to add the [INPUT] tail path to your existing config.

[SERVICE]
    Flush        1
    Daemon       Off
    Log_Level    info
    Parsers_File parsers.conf

[INPUT]
    Name             tail
    Path             /var/log/app/*.log
    Tag              app.*
    Parser           json
    Read_from_Head   True
    Refresh_Interval 5
    Rotate_Wait      30
    DB               /fluent-bit/etc/tail.db
{% if cookiecutter.log_target == "kafka" %}
[OUTPUT]
    Name         kafka
    Match        app.*
    Brokers      ${KAFKA_BOOTSTRAP_SERVERS}
    Topics       {{ cookiecutter.project_slug }}-logs
    Format       json
    Timestamp_Key @timestamp
    Retry_Limit  5
{% elif cookiecutter.log_target == "elasticsearch" %}
[OUTPUT]
    Name         es
    Match        app.*
    Host         ${ELASTICSEARCH_HOST}
    Port         ${ELASTICSEARCH_PORT}
    Index        {{ cookiecutter.project_slug }}-logs
    Type         _doc
    Logstash_Format On
    Logstash_Prefix {{ cookiecutter.project_slug }}-logs
    Retry_Limit  5
{% elif cookiecutter.log_target == "opensearch" %}
[OUTPUT]
    Name         opensearch
    Match        app.*
    Host         ${OPENSEARCH_HOST}
    Port         ${OPENSEARCH_PORT}
    Index        {{ cookiecutter.project_slug }}-logs
    Type         _doc
    Logstash_Format On
    Logstash_Prefix {{ cookiecutter.project_slug }}-logs
    Retry_Limit  5
{% elif cookiecutter.log_target == "loki" %}
[OUTPUT]
    Name         loki
    Match        app.*
    Host         ${LOKI_HOST}
    Port         ${LOKI_PORT}
    Labels       job={{ cookiecutter.project_slug }}
    Retry_Limit  5
{% elif cookiecutter.log_target == "http" %}
[OUTPUT]
    Name         http
    Match        app.*
    Host         ${LOG_HTTP_HOST}
    Port         ${LOG_HTTP_PORT}
    URI          ${LOG_HTTP_PATH}
    Format       json
    Retry_Limit  5
{% endif %}
# ── Dev: also print to stdout (remove in production) ─────────────────────────
[OUTPUT]
    Name   stdout
    Match  app.*
    Format json_lines
